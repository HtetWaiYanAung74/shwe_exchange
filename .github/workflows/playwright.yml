name: Binance P2P Rate Tests
on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Create Auth JSON File from Secret
        run: |
          echo '${{ secrets.BINANCE_AUTH_JSON }}' > binance-auth.json

      - name: Install Playwright Chrome Browser
        run: npx playwright install chromium --with-deps

      - name: Run tests (with X virtual framebuffer)
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' npm test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report
          path: reports/
          retention-days: 7
